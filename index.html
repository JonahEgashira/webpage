<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>自己紹介</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2933;
        --muted: #667085;
        --accent: #2563eb;
        --line: #d9dee7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.7;
      }

      main {
        width: min(92vw, 680px);
        padding: 48px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 50px rgba(31, 41, 51, 0.08);
      }

      .avatar {
        width: 96px;
        height: 96px;
        display: grid;
        place-items: center;
        margin-bottom: 24px;
        border-radius: 50%;
        background: #e8f0ff;
        color: var(--accent);
        font-size: 40px;
        font-weight: 700;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.25;
      }

      .role {
        margin: 0 0 28px;
        color: var(--muted);
        font-size: 17px;
      }

      p {
        margin: 0 0 20px;
      }

      .details {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin: 32px 0;
      }

      .details div {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .details dt {
        color: var(--muted);
        font-size: 13px;
      }

      .details dd {
        margin: 4px 0 0;
        font-weight: 700;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      .links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border-radius: 8px;
        background: var(--accent);
        color: #ffffff;
        font-weight: 700;
        text-decoration: none;
      }

      .links a.secondary {
        background: #eef2f7;
        color: var(--text);
      }

      @media (max-width: 560px) {
        body {
          place-items: start center;
          padding: 24px 0;
        }

        main {
          padding: 28px;
        }

        h1 {
          font-size: 28px;
        }

        .details {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="avatar" aria-hidden="true">名</div>
      <h1>山田 太郎</h1>
      <p class="role">Web制作とデザインが好きな学生です</p>

      <p>
        はじめまして。シンプルで使いやすいWebサイトを作ることに興味があります。
        現在はHTML、CSS、JavaScriptを学びながら、小さな作品づくりに取り組んでいます。
      </p>

      <dl class="details">
        <div>
          <dt>好きなこと</dt>
          <dd>デザイン</dd>
        </div>
        <div>
          <dt>学習中</dt>
          <dd>JavaScript</dd>
        </div>
        <div>
          <dt>目標</dt>
          <dd>Web開発</dd>
        </div>
      </dl>

      <p>
        見た人に伝わりやすい表現を大切にしながら、少しずつできることを増やしています。
      </p>

      <div class="links" aria-label="関連リンク">
        <a href="mailto:your-name@example.com">メールする</a>
        <a class="secondary" href="#" aria-label="ポートフォリオへのリンク">ポートフォリオ</a>
      </div>
    </main>
  </body>
</html>
